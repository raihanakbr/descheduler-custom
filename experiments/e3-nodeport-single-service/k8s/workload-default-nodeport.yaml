apiVersion: v1
kind: Namespace
metadata:
  name: e3-nodeport
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workload-http
  namespace: e3-nodeport
spec:
  replicas: 6
  selector:
    matchLabels:
      app: workload-http
  template:
    metadata:
      labels:
        app: workload-http
    spec:
      containers:
      - name: workload
        image: docker.io/matthewhjt/workload-http:manual-v1
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
        env:
        - name: MAX_CPU_MS
          value: "1000"
        - name: MAX_MEM_MB
          value: "96"
        - name: MAX_HOLD_MS
          value: "3000"
        - name: MAX_INFLIGHT
          value: "32"
        - name: MAX_TOTAL_ALLOC_MB
          value: "192"
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
          limits:
            cpu: 500m
            memory: 300Mi
---
apiVersion: v1
kind: Service
metadata:
  name: workload-http
  namespace: e3-nodeport
spec:
  type: NodePort
  selector:
    app: workload-http
  ports:
  - name: http
    port: 80
    targetPort: 8080

