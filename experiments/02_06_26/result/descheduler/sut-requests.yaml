---
# ResourceDefragmentation (SUT) under requests mode, scoped to the experiment
# namespace so it only acts on experiment pods. Applied fresh before every pass
# by perform_and_capture.sh (RBAC/ConfigMap re-apply is idempotent; the Job is
# deleted + recreated each pass).
#
# Threshold alignment (fairness control #4): consolidationThreshold 0.40 == the
# 40% "under-utilized" definition used for B1 HighNodeUtilization.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: descheduler
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: descheduler-role
rules:
- apiGroups: [""]
  resources: ["nodes", "pods", "persistentvolumeclaims", "persistentvolumes"]
  verbs: ["get", "watch", "list"]
- apiGroups: [""]
  resources: ["pods/eviction"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "update"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["update"]   # only needed by actual-ewma-persisted; harmless in requests mode
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: descheduler-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: descheduler-role
subjects:
- kind: ServiceAccount
  name: descheduler
  namespace: kube-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: descheduler-policy
  namespace: kube-system
data:
  policy.yaml: |
    apiVersion: "descheduler/v1alpha2"
    kind: "DeschedulerPolicy"
    profiles:
      - name: default
        pluginConfig:
        - name: "ResourceDefragmentation"
          args:
            namespaces:
              include:
                - defrag-exp
            maxEvictions: 50
            usageMode: "requests"
            consolidationThreshold: 0.40
            consolidationTarget: 1
        plugins:
          balance:
            enabled:
              - "ResourceDefragmentation"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: descheduler-job
  namespace: kube-system
spec:
  backoffLimit: 1
  template:
    metadata:
      name: descheduler
    spec:
      serviceAccountName: descheduler
      containers:
      - name: descheduler
        image: keegou/descheduler-custom:alpha-7
        command:
        - "/bin/descheduler"
        args:
        - "--policy-config-file=/policy-dir/policy.yaml"
        - "--v=3"
        volumeMounts:
        - mountPath: /policy-dir
          name: policy-volume
      restartPolicy: Never
      volumes:
      - name: policy-volume
        configMap:
          name: descheduler-policy
