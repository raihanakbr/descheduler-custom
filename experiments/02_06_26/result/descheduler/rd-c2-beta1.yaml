---
# ResourceDefragmentationC2 (SUT, C2) — SAME consolidation strategy as
# rd-current.yaml / descheduler-custom.yaml, but on the NEW binary
#   image: keegou/descheduler-custom:beta-1
# The only changed variable vs ResourceDefragmentation (rd-current.yaml) is the
# image tag (alpha-8 -> beta-1). Scope, threshold, target, penalty, and
# usageMode are identical so the comparison isolates the binary change.
#
# usageMode is pinned to "requests" on purpose: beta-1 documents that an empty
# UsageMode now DEFAULTS to actual-ewma when a metrics collector is present.
# This cluster has no metrics-server and we want the requests signal, so we set
# it explicitly to keep C2 on the same requests-based signal as RD/HNU.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: descheduler
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: descheduler-role
rules:
- apiGroups: [""]
  resources: ["nodes", "pods", "persistentvolumeclaims", "persistentvolumes"]
  verbs: ["get", "watch", "list"]
- apiGroups: [""]
  resources: ["pods/eviction"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "update"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: descheduler-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: descheduler-role
subjects:
- kind: ServiceAccount
  name: descheduler
  namespace: kube-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: descheduler-policy
  namespace: kube-system
data:
  policy.yaml: |
    apiVersion: "descheduler/v1alpha2"
    kind: "DeschedulerPolicy"
    profiles:
      - name: default
        pluginConfig:
        - name: "ResourceDefragmentation"
          args:
            namespaces:
              exclude:
                - kube-system
            maxEvictions: 50
            usageMode: "requests"
            consolidationThreshold: 0.4
            consolidationTarget: 0.9
            balancePenaltyWeight: 0.7
        plugins:
          balance:
            enabled:
              - "ResourceDefragmentation"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: descheduler-job
  namespace: kube-system
spec:
  backoffLimit: 1
  template:
    metadata:
      name: descheduler
    spec:
      serviceAccountName: descheduler
      containers:
      - name: descheduler
        image: keegou/descheduler-custom:beta-1
        command:
        - "/bin/descheduler"
        args:
        - "--policy-config-file=/policy-dir/policy.yaml"
        - "--v=3"
        volumeMounts:
        - mountPath: /policy-dir
          name: policy-volume
      restartPolicy: Never
      volumes:
      - name: policy-volume
        configMap:
          name: descheduler-policy
