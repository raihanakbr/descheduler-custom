---
# ResourceDefragmentation (SUT) — isolated-lambda re-run.
# Identical to sut-requests.yaml EXCEPT:
#   - image alpha-7 -> alpha-8 (adds balancePenaltyWeight support)
#   - args: balancePenaltyWeight: 0.7
# consolidationTarget stays 1 and namespace scope stays include:defrag-exp so the
# ONLY changed variable vs REPORT.md is lambda. (Confound control.)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: descheduler
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: descheduler-role
rules:
- apiGroups: [""]
  resources: ["nodes", "pods", "persistentvolumeclaims", "persistentvolumes"]
  verbs: ["get", "watch", "list"]
- apiGroups: [""]
  resources: ["pods/eviction"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "update"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: descheduler-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: descheduler-role
subjects:
- kind: ServiceAccount
  name: descheduler
  namespace: kube-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: descheduler-policy
  namespace: kube-system
data:
  policy.yaml: |
    apiVersion: "descheduler/v1alpha2"
    kind: "DeschedulerPolicy"
    profiles:
      - name: default
        pluginConfig:
        - name: "ResourceDefragmentation"
          args:
            namespaces:
              include:
                - defrag-exp
            maxEvictions: 50
            usageMode: "requests"
            consolidationThreshold: 0.40
            consolidationTarget: 1
            balancePenaltyWeight: 0.7
        plugins:
          balance:
            enabled:
              - "ResourceDefragmentation"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: descheduler-job
  namespace: kube-system
spec:
  backoffLimit: 1
  template:
    metadata:
      name: descheduler
    spec:
      serviceAccountName: descheduler
      containers:
      - name: descheduler
        image: keegou/descheduler-custom:alpha-8
        command:
        - "/bin/descheduler"
        args:
        - "--policy-config-file=/policy-dir/policy.yaml"
        - "--v=3"
        volumeMounts:
        - mountPath: /policy-dir
          name: policy-volume
      restartPolicy: Never
      volumes:
      - name: policy-volume
        configMap:
          name: descheduler-policy
