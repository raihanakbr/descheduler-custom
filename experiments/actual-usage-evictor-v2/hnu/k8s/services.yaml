apiVersion: v1
kind: Service
metadata:
  name: workload-api
  namespace: actual-usage-exp
spec:
  type: NodePort
  selector:
    app: workload-api
    experiment: actual-usage-evictor
  ports:
  - name: http
    port: 80
    targetPort: 8080
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: workload
  namespace: actual-usage-exp
spec:
  minAvailable: 6
  selector:
    matchLabels:
      experiment: actual-usage-evictor
