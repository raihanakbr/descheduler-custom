apiVersion: descheduler/v1alpha2
kind: DeschedulerPolicy
maxNoOfPodsToEvictTotal: 3
profiles:
- name: actual-usage-hnu-h0
  pluginConfig:
  - name: DefaultEvictor
    args:
      nodeFit: true
  - name: HighNodeUtilization
    args:
      thresholds:
        cpu: 40
        memory: 40
      evictableNamespaces:
        include:
        - actual-usage-exp
  plugins:
    filter:
      enabled:
      - DefaultEvictor
    preevictionfilter:
      enabled:
      - DefaultEvictor
    balance:
      enabled:
      - HighNodeUtilization
