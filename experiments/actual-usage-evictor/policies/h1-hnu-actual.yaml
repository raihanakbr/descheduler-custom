apiVersion: descheduler/v1alpha2
kind: DeschedulerPolicy
metricsProviders:
- source: KubernetesMetrics
maxNoOfPodsToEvictTotal: 1
profiles:
- name: actual-usage-h1
  pluginConfig:
  - name: DefaultEvictor
    args:
      nodeFit: true
  - name: ActualUsageEvictor
    args:
      cpuUsageThreshold: 0.80
      memoryUsageThreshold: 0.90
      namespaces:
        include:
        - actual-usage-exp
      labelSelector:
        matchLabels:
          experiment: actual-usage-evictor
  - name: HighNodeUtilization
    args:
      thresholds:
        cpu: 40
        memory: 40
      evictableNamespaces:
        exclude:
        - kube-system
        - kube-public
        - kube-node-lease
        - default
  plugins:
    preevictionfilter:
      enabled:
      - ActualUsageEvictor
    balance:
      enabled:
      - HighNodeUtilization
