apiVersion: v1
kind: ConfigMap
metadata:
  name: actual-usage-agent-config
  namespace: kube-system
data:
  # This agent records actual runtime usage from metrics.k8s.io.
  # It does not use Kubernetes requests/limits for RII calculation.
  args: |
    --metrics-source=metrics-server
    --interval=30s
    --output-dir=/var/log/actual-usage-agent
    --fragmentation-threshold=0.20
    --namespace=
    --remediation-mode=report
